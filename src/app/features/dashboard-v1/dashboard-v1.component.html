<div class="client-dashboard-wrapper container py-4">
    <!-- Welcome Header -->
    <div class="glass-card p-4 px-5 rounded-30 border shadow-sm d-flex align-items-center gap-4 mb-4">
        <div class="stats-icon rounded-circle bg-primary-fixed-dim text-primary d-flex align-items-center justify-content-center flex-shrink-0" style="width: 72px; height: 72px; font-size: 1.8rem;">
            {{ getInitials(clientName) }}
        </div>
        <div class="overflow-hidden">
            <h1 class="font-h1 text-on-surface mb-1 text-truncate">Welcome, {{ clientName }}!</h1>
            <p class="text-text-secondary mb-0">Here's an overview of your documents and activity.</p>
        </div>
    </div>

</div>
