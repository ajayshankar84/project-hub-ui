<div class="auth-container d-flex align-items-center justify-content-center">
  <div class="card glass-card p-4 p-md-5 shadow-lg">
    <div class="text-center mb-5">
      <h2 class="fw-bold text-gradient">Forgot Password?</h2>
      <p class="text-secondary small">Enter your registered email and we'll send you a secure link to reset your credentials.</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-envelope text-primary"></i></span>
          <input type="email" formControlName="email" class="form-control border-start-0" placeholder="name@example.com"
                 [class.is-invalid]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
        </div>
        <div class="invalid-feedback animate__animated animate__fadeIn" *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid">
          Please enter a valid business email address.
        </div>
      </div>

      <div *ngIf="successMessage" class="alert alert-success border-0 py-2 mb-4 d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <small>{{ successMessage }}</small>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger border-0 py-2 mb-4 d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <small>{{ errorMessage }}</small>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="forgotForm.invalid || loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Processing...' : 'Send Reset Link' }}
      </button>
    </form>

    <div class="text-center mt-4">
      <a routerLink="/auth/login" class="text-decoration-none small text-primary fw-semibold">
        <i class="bi bi-arrow-left me-1"></i> Back to Login
      </a>
    </div>
  </div>
</div>
